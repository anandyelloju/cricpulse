<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CricPulse is a free online cricket score calculator and live scoring app for local matches, tournaments, and practice games."
    />

    <title>
      CricPulse - Free Online Cricket Score Calculator & Live Scoring App
    </title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>

  <body class="min-h-screen bg-slate-50 text-slate-950" data-page="setup">
    <div class="mx-auto max-w-2xl px-4 pb-28 pt-3 sm:pt-5">
      <header
        class="sticky top-0 z-40 -mx-4 mb-5 bg-slate-50/95 px-4 pb-3 pt-3 backdrop-blur"
      >
        <div class="app-shell-header mb-5">
          <div class="brand-lockup">
            <span class="brand-mark">CP</span>
            <div class="min-w-0">
              <p class="font-bold leading-tight text-slate-950">CricPulse</p>
              <p class="text-xs font-semibold text-slate-500">
                Fast cricket scoring
              </p>
            </div>
          </div>
          <span class="chip bg-blue-50 text-blue-700">Setup</span>
        </div>
        <h1 class="mt-1 text-3xl font-bold text-slate-950">Match setup</h1>

        <p class="mt-2 text-sm leading-6 text-slate-600">
          Build the match in three quick steps. Player names can be skipped and
          CricPulse will fill sensible defaults.
        </p>
      </header>

      <main id="setup-root" class="space-y-4"></main>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
