<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>CricPulse - Match Summary</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="./assets/css/style.css"/>
</head>

<body class="min-h-screen bg-slate-50 text-slate-950" data-page="summary">

  <div class="mx-auto max-w-5xl px-4 py-3 sm:py-5">

    <header class="sticky top-0 z-40 -mx-4 mb-5 bg-slate-50/95 px-4 pb-3 pt-3 backdrop-blur">
      <div class="app-shell-header mb-5">
        <div class="brand-lockup">
          <span class="brand-mark">CP</span>
          <div class="min-w-0">
            <p class="font-bold leading-tight text-slate-950">CricPulse</p>
            <p class="text-xs font-semibold text-slate-500">Fast cricket scoring made simple</p>
          </div>
        </div>
        <span class="chip bg-emerald-50 text-emerald-700">Summary</span>
      </div>
      <h1 class="mt-1 text-3xl font-bold">
        Match summary
      </h1>
    </header>

    <main id="summary-root" class="space-y-4"></main>

  </div>

  <script type="module" src="./js/app.js"></script>

</body>
</html>
