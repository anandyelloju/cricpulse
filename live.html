<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>CricPulse - Live Match</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="./assets/css/style.css"/>
</head>

<body class="bg-gray-100 min-h-screen">

  <div class="max-w-6xl mx-auto p-4">

    <header class="bg-white rounded-lg shadow-md p-4 mb-4">
      <h1 class="text-2xl font-bold text-gray-900">
        LIVE SCORE
      </h1>
    </header>

    <main class="grid gap-4 md:grid-cols-2">

      <section class="bg-white rounded-lg shadow-md p-4">
        <h2 class="text-lg font-semibold mb-2">
          Scoreboard
        </h2>

        <div id="scoreboard-root"></div>
      </section>

      <section class="bg-white rounded-lg shadow-md p-4">
        <h2 class="text-lg font-semibold mb-2">
          Ball History
        </h2>

        <div id="history-root"></div>
      </section>

      <section class="bg-white rounded-lg shadow-md p-4 md:col-span-2">
        <h2 class="text-lg font-semibold mb-2">
          Scoring Controls
        </h2>

        <div id="controls-root"></div>
      </section>

    </main>

  </div>

  <script type="module" src="./js/app.js"></script>

</body>
</html>
