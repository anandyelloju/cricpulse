<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CricPulse - Live Match</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>

  <body class="bg-gray-100 min-h-screen">
    <div class="max-w-6xl mx-auto p-4">
      <header class="bg-white rounded-lg shadow-md p-4 mb-4">
        <h1 class="text-2xl font-bold text-gray-900">LIVE SCORE</h1>
      </header>

      <main class="grid gap-4 lg:grid-cols-3">
        <section class="bg-white rounded-lg shadow-md p-4">
          <h2 class="text-lg font-semibold mb-4">Scoreboard</h2>

          <div id="scoreboard-root"></div>
        </section>

        <section class="bg-white rounded-lg shadow-md p-4 lg:col-span-2">
          <h2 class="text-lg font-semibold mb-4">Batting Card</h2>

          <div id="batting-root"></div>
        </section>

        <section class="bg-white rounded-lg shadow-md p-4 lg:col-span-3">
          <h2 class="text-lg font-semibold mb-4">Bowling Card</h2>

          <div id="bowling-root"></div>
        </section>
      </main>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
