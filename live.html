<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CricPulse - Live Match</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>

  <body class="min-h-screen bg-slate-50 text-slate-950" data-page="live">
    <div class="mx-auto max-w-5xl pb-48">
      <header class="sticky top-0 z-30 bg-slate-50/95 px-4 py-3 backdrop-blur">
        <div class="app-shell-header mx-auto mb-3 max-w-5xl">
          <div class="brand-lockup">
            <span class="brand-mark">CP</span>
            <div class="min-w-0">
              <p class="font-bold leading-tight text-slate-950">CricPulse</p>
              <p class="text-xs font-semibold text-slate-500">Live scoring companion</p>
            </div>
          </div>
          <span class="chip live-pulse bg-red-50 text-red-700">Live</span>
        </div>
        <div id="scoreboard-root"></div>
      </header>

      <main class="space-y-4 px-4 py-4">
        <section class="app-card">
          <div class="mb-3 flex items-center justify-between gap-3">
            <h2 class="section-title">Recent balls</h2>
            <span class="text-xs font-semibold text-slate-500">Current over</span>
          </div>
          <div id="history-root"></div>
        </section>

        <section class="app-card">
          <div id="players-root"></div>
        </section>

        <section class="app-card">
          <details>
            <summary class="flex cursor-pointer list-none items-center justify-between gap-3">
              <span class="section-title">Over history</span>
              <span class="text-xs font-semibold text-slate-500">Tap to expand</span>
            </summary>
            <div id="over-history-root" class="mt-3"></div>
          </details>
        </section>

        <section class="grid gap-4 lg:grid-cols-2">
          <div class="app-card">
            <h2 class="section-title mb-3">Batting</h2>
            <div id="batting-root"></div>
          </div>

          <div class="app-card">
            <h2 class="section-title mb-3">Bowling</h2>
            <div id="bowling-root"></div>
          </div>
        </section>
      </main>
    </div>

    <section id="controls-root" class="fixed inset-x-0 bottom-0 z-30 border-t border-slate-200 bg-white/95 p-3 shadow-2xl backdrop-blur"></section>
    <div id="modal-root"></div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
